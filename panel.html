<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Disink · Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#12141a;--panel:#1c1f28;--panel2:#242835;--magenta:#e91e8c;--cyan:#00c2e0;--yellow:#ffc93c;--text:#f2f3f7;--muted:#9aa0b4;--border:#333849}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh}
header{padding:16px 5vw;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-weight:800;font-size:1.2rem}.logo span{color:var(--magenta)}.logo em{color:var(--cyan);font-style:normal}
main{max-width:920px;margin:0 auto;padding:26px 5vw 80px}
.btn{padding:11px 20px;border-radius:11px;border:none;font-family:inherit;font-weight:700;font-size:.9rem;cursor:pointer;transition:.2s}
.btn.primary{background:linear-gradient(90deg,var(--magenta),#ff5db1);color:#fff}
.btn.cyan{background:linear-gradient(90deg,#00a5c4,var(--cyan));color:#04252c}
.btn.ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn:hover{filter:brightness(1.1)}
input{background:var(--panel);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-family:inherit;font-size:1rem;outline:none;width:100%}
input:focus{border-color:var(--cyan)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px}
.hint{color:var(--muted);font-size:.85rem}
textarea{width:100%;min-height:120px;background:#0f1117;border:1.5px solid var(--border);border-radius:8px;padding:11px;color:var(--text);font-family:inherit;font-size:.76rem;line-height:1.5;resize:vertical}
.err{color:#ffb3d6;font-size:.85rem;margin-top:10px;display:none}
.spinner{width:34px;height:34px;border:4px solid var(--border);border-top-color:var(--magenta);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div class="logo">D<em>is</em>ink <span>Control</span> · Panel</div>
  <button class="btn ghost" id="salir" style="display:none" onclick="cerrarSesion()">Cerrar sesión</button>
</header>
<main>
  <!-- LOGIN -->
  <div id="login" style="max-width:380px;margin:60px auto;text-align:center">
    <h1 style="font-size:1.5rem;margin-bottom:6px">Acceso del equipo</h1>
    <p class="hint" style="margin-bottom:22px">Solo diseño y recepción. Ingresa la contraseña.</p>
    <input type="password" id="pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')entrar()">
    <button class="btn primary" style="width:100%;margin-top:14px" onclick="entrar()">Entrar</button>
    <p class="err" id="err">Contraseña incorrecta.</p>
  </div>
  <!-- PANEL -->
  <div id="panel" style="display:none"></div>
</main>

<script>
const KEYNAME = "dc_panel_pass";
function getPass(){ try{ return sessionStorage.getItem(KEYNAME)||""; }catch(e){ return ""; } }
function entrar(){
  const p = document.getElementById("pass").value.trim();
  if(!p) return;
  try{ sessionStorage.setItem(KEYNAME, p); }catch(e){}
  cargar();
}
function cerrarSesion(){
  try{ sessionStorage.removeItem(KEYNAME); }catch(e){}
  document.getElementById("panel").style.display="none";
  document.getElementById("panel").innerHTML="";
  document.getElementById("login").style.display="";
  document.getElementById("salir").style.display="none";
  document.getElementById("pass").value="";
}
function copyBox(id,btn){
  const t=document.getElementById(id); if(!t) return;
  const done=()=>{ if(btn){const o=btn.textContent;btn.textContent="✅ Copiado";setTimeout(()=>btn.textContent=o,1500);} };
  if(navigator.clipboard){ navigator.clipboard.writeText(t.value).then(done,done); } else { t.select(); document.execCommand("copy"); done(); }
}
function downloadBox(id,fname){
  const t=document.getElementById(id); if(!t) return;
  const blob=new Blob([t.value],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=fname; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function esc(s){ return (s||"").toString().replace(/</g,"&lt;"); }

async function cargar(){
  const pass = getPass();
  if(!pass){ cerrarSesion(); return; }
  const login=document.getElementById("login"), panel=document.getElementById("panel");
  login.style.display="none";
  panel.style.display="";
  document.getElementById("salir").style.display="";
  panel.innerHTML=`<div class="spinner"></div><p class="hint" style="text-align:center">Cargando pedidos…</p>`;
  let pedidos=[];
  try{
    const r = await fetch("/api/order", { headers: { "x-studio-key": pass } });
    if(r.status===403){ // contraseña incorrecta
      login.style.display=""; panel.style.display="none"; document.getElementById("salir").style.display="none";
      document.getElementById("err").style.display="block";
      try{ sessionStorage.removeItem(KEYNAME); }catch(e){}
      return;
    }
    const j = await r.json();
    if(j && j.pedidos) pedidos = j.pedidos; else throw new Error(j.error||"Error");
  }catch(e){
    panel.innerHTML=`<div style="text-align:center;margin:40px auto"><h2>No se pudieron cargar los pedidos</h2><p class="hint">${esc(e.message)}</p><button class="btn ghost" style="margin-top:12px" onclick="cargar()">Reintentar</button></div>`;
    return;
  }
  render(pedidos);
}

function render(pedidos){
  const panel=document.getElementById("panel");
  const box=(id)=>`<textarea id="${id}" readonly></textarea>
    <button class="btn cyan" style="margin:6px 6px 0 0;padding:7px 13px" onclick="copyBox('${id}',this)">📋 Copiar</button>
    <button class="btn ghost" style="margin:6px 0 0 0;padding:7px 13px" onclick="downloadBox('${id}','${id}.txt')">📄 .txt</button>`;
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:8px">
      <h1 style="font-size:1.5rem">Pedidos pagados <span style="color:var(--muted);font-size:1rem">(${pedidos.length})</span></h1>
      <button class="btn cyan" style="padding:8px 16px" onclick="cargar()">↺ Recargar</button>
    </div>
    <p class="hint" style="margin-bottom:18px">Copia cada prompt y pégalo en ChatGPT para generar el arte.</p>`;
  if(!pedidos.length) html+=`<p class="hint">Aún no hay pedidos pagados.</p>`;
  pedidos.forEach(p=>{
    const d=p.data||{}, idp="p"+p.id, fecha=(p.created_at||"").slice(0,16).replace("T"," ");
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <b style="color:var(--yellow)">Pedido #${p.id} · ${esc(p.paquete||"")}</b>
        <span class="hint">${fecha}</span>
      </div>
      <div style="font-size:.85rem;margin:8px 0 12px;line-height:1.7">
        <b>Alumno:</b> ${esc(d.nombre||"—")} · <b>Escuela:</b> ${esc(d.escuela||"—")} · <b>Grado:</b> ${esc(d.grado||"—")} <b>Grupo:</b> ${esc(d.grupo||"—")}<br>
        <b>Maestro(a):</b> ${esc(d.maestro||"—")} · <b>Tel:</b> ${esc(d.tel||"—")} · <b>Tema:</b> ${esc(d.tema||"—")}<br>
        <b>Materias:</b> ${esc((d.materias||[]).join(", ")||"—")}
      </div>
      <div><b style="font-size:.82rem">🖼️ Portada</b>${box(idp+"_por")}</div>
      <div style="margin-top:10px"><b style="font-size:.82rem">📓 Materias</b>${box(idp+"_mat")}</div>
      <div style="margin-top:10px"><b style="font-size:.82rem">✏️ Tiras</b>${box(idp+"_tir")}</div>
      <div style="margin-top:10px"><b style="font-size:.82rem">🖨️ Plan 13×19"</b>${box(idp+"_pla")}</div>
    </div>`;
  });
  panel.innerHTML=html;
  pedidos.forEach(p=>{
    const pr=p.prompts||{}, idp="p"+p.id;
    const set=(suf,v)=>{ const t=document.getElementById(idp+suf); if(t) t.value=v||""; };
    set("_por",pr.portada); set("_mat",pr.materia); set("_tir",pr.tira); set("_pla",pr.plan);
  });
  window.scrollTo({top:0});
}

// Si ya había sesión abierta en esta pestaña, entra directo
if(getPass()) cargar();
</script>
</body>
</html>
